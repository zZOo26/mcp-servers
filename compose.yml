services:
  mcp-serper:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: serper
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9006:9006"
    networks:
      - avatar-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9006/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-tavily:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: tavily
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9003:9003"
    networks:
      - avatar-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-gtfs-transit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gtfs-transit
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9007:9007"
    networks:
      - avatar-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9007/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  avatar-network:
    external: true
    name: das-backend_avatar-network
